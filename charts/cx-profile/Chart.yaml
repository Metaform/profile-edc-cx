apiVersion: v2
name: catenax-profile
description: |
  Dataspace-specific seeding for the Catena-X dataspace, layered on top of a Core Platform
  Distribution deployment. Defines Catena-X's credential model: the issuer Attestation/Credential
  Definitions (Membership + Bpn + DataExchangeGovernance) and the tenant-manager Dataspace Profile, deployed
  onto the platform-provisioned cell.
type: application
version: 0.1.0
appVersion: "latest"
