## Configures the Catena-X dataspace profile (cx-neptune) on the EDC controlplane via its
## /v5beta Management API: the DataspaceProfile, its cached JSON-LD contexts, the DCP scopes
## and the CEL policy expressions. Runs after issuer-credentials-seed (10) and
## dataspace-profile-seed (20). Idempotent: HTTP 409 is treated as "already present".

{{- if .Values.seedJobs.edcSeed.enabled }}
{{- $edc := .Values.seedJobs.edcSeed }}
{{- $edcBase := printf "http://%s:%v%s" (include "jadtx.fqdn" (dict "svc" $edc.management.service "ctx" $)) $edc.management.port $edc.management.basePath }}
apiVersion: batch/v1
kind: Job
metadata:
  name: edc-seed
  namespace: {{ include "jadtx.namespace" . }}
  labels:
    app: edc-seed
    platform: edcv
    type: edcv-job
    {{- include "jadtx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: edc-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: {{ .Values.seedJobs.serviceAccountName }}
      restartPolicy: OnFailure
      initContainers:
        # Wait for the EDC controlplane Management API to answer. A bare `curl -s` exits 0 on
        # any HTTP response (incl. 401/405), non-zero only on connection failure — so this is a
        # readiness gate that needs no auth.
        - name: wait-for-edc
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: EDC_BASE
              value: {{ $edcBase | quote }}
          command:
            - sh
            - -c
            - |
              until curl -s -o /dev/null "${EDC_BASE}/v5beta/dataspaceprofiles"; do
                echo "Waiting for EDC controlplane management API at ${EDC_BASE} ..."
                sleep 5
              done
              echo "EDC controlplane management API is ready!"
      containers:
        - name: seed-edc
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: EDC_BASE
              value: {{ $edcBase | quote }}
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "jadtx.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              # seed <label> <endpoint>  — POSTs the JSON body read from stdin to
              # $EDC_BASE/v5beta/<endpoint>. Uses --data @- so single quotes inside the CEL
              # expressions don't break shell quoting. HTTP 409 is tolerated (already present).
              seed() {
                RESP=$(curl -s -w "\n%{http_code}" -X POST "${EDC_BASE}/v5beta/$2" \
                  -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --data @-)
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
                if [ "$RESP_STATUS" -eq 409 ]; then
                  echo "⚠ $1 already present"
                elif [ "$RESP_STATUS" -ge 400 ]; then
                  echo "ERROR: $1 failed (HTTP $RESP_STATUS): $RESP_BODY"
                  exit 1
                else
                  echo "✓ $1 created"
                fi
              }

              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              echo "================================================"
              echo "Obtain Management-API token"
              echo "================================================"

              # exchange SA token for a management-api scoped connector token
              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource={{ $edc.participantContextId }}" \
                --data-urlencode "scope={{ $edc.scope }}" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Management-API token obtained"

              echo ""
              echo "================================================"
              echo "Create Dataspace Profile"
              echo "================================================"
              seed "Dataspace Profile cx-neptune" "dataspaceprofiles" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "DataspaceProfile",
                "name": "cx-neptune",
                "protocol": {
                  "version": "2025-1",
                  "binding": "https",
                  "namespace": "https://w3id.org/dspace/2025/1/"
                },
                "jsonLdContextsUrl": [
                  "https://w3id.org/catenax/2025/9/policy/context.jsonld",
                  "https://w3id.org/catenax/2025/9/policy/odrl.jsonld",
                  "https://w3id.org/dspace/2025/1/context.jsonld",
                  "https://w3id.org/edc/dspace/v0.0.1"
                ]
              }
              JSON

              echo ""
              echo "================================================"
              echo "Cache JSON-LD contexts"
              echo "================================================"
              seed "JSON-LD context odrl.jsonld" "cacheddocuments" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CachedDocument",
                "url": "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
              }
              JSON
              seed "JSON-LD context context.jsonld" "cacheddocuments" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CachedDocument",
                "url": "https://w3id.org/catenax/2025/9/policy/context.jsonld"
              }
              JSON
              seed "JSON-LD context tx auth" "cacheddocuments" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CachedDocument",
                "url": "https://w3id.org/tractusx/auth/v1.0.0",
                "content":{
                    "@context": {
                      "@version": 1.1,
                      "@protected": true,
                      "tx-auth": "https://w3id.org/tractusx/auth/",
                      "refreshToken": "tx-auth:refreshToken",
                      "refreshEndpoint": "tx-auth:refreshEndpoint",
                      "refreshAudience": "tx-auth:refreshAudience",
                      "audience": "tx-auth:audience",
                      "expiresIn": "tx-auth:expiresIn"
                    }
                }
              }
              JSON

              echo ""
              echo "================================================"
              echo "Create DCP scopes"
              echo "================================================"
              seed "DCP scope MembershipCredential" "dcpscopes" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "DcpScope",
                "@id": "membership-scope",
                "value": "org.eclipse.dspace.dcp.vc.type:MembershipCredential:read",
                "profile": "cx-neptune"
              }
              JSON
              seed "DCP scope BpnCredential" "dcpscopes" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "DcpScope",
                "@id": "bpn-scope",
                "value": "org.eclipse.dspace.dcp.vc.type:BpnCredential:read",
                "profile": "cx-neptune"
              }
              JSON
              seed "DCP scope DataExchangeGovernanceCredential" "dcpscopes" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "DcpScope",
                "@id": "gov-scope",
                "value": "org.eclipse.dspace.dcp.vc.type:DataExchangeGovernanceCredential:read",
                "profile": "cx-neptune"
              }
              JSON

              echo ""
              echo "================================================"
              echo "Create CEL expressions"
              echo "================================================"
              seed "CEL expression membership-expression" "celexpressions" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CelExpression",
                "@id": "membership-expression",
                "leftOperand": "https://w3id.org/catenax/2025/9/policy/Membership",
                "description": "Catena-X membership check: requires a valid MembershipCredential.",
                "scopes": [
                  "catalog",
                  "contract.negotiation",
                  "transfer.process"
                ],
                "expression": "ctx.agent.claims.vc.filter(c, c.type.exists(t, t == 'MembershipCredential')).exists(c, c.credentialSubject.exists(cs, cs.memberOf == 'Catena-X'))"
              }
              JSON
              seed "CEL expression gov-expression" "celexpressions" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CelExpression",
                "@id": "gov-expression",
                "leftOperand": "https://w3id.org/catenax/2025/9/policy/FrameworkAgreement",
                "description": "Catena-X framework agreement check: the consumer must hold a DataExchangeGovernanceCredential matching the contract version in the right operand (e.g. 1.0).",
                "scopes": [
                  "catalog",
                  "contract.negotiation",
                  "transfer.process"
                ],
                "expression": "ctx.agent.claims.vc.filter(c, c.type.exists(t, t == 'DataExchangeGovernanceCredential')).exists(c, c.credentialSubject.exists(cs, 'DataExchangeGovernance:' + cs.contractVersion == this.rightOperand))"
              }
              JSON
              seed "CEL expression bpn-expression" "celexpressions" <<'JSON'
              {
                "@context": [
                  "https://w3id.org/edc/connector/management/v2"
                ],
                "@type": "CelExpression",
                "@id": "bpn-expression",
                "leftOperand": "https://w3id.org/catenax/2025/9/policy/BusinessPartnerNumber",
                "description": "Catena-X Business Partner Number check: the active agreement's BPN (or a configured cross-reference property) must equal the right operand.",
                "scopes": [
                  "catalog",
                  "contract.negotiation",
                  "transfer.process"
                ],
                "expression": "ctx.agent.claims.vc.filter(c, c.type.exists(t, t == 'BpnCredential')).exists(c, c.credentialSubject.exists(cs, cs.bpn == this.rightOperand ))"
              }
              JSON

              echo ""
              echo "================================================"
              echo "EDC profile seeding completed successfully!"
              echo "================================================"
      volumes:
        {{- include "jadtx.jwtletSubjectTokenVolume" . | nindent 8 }}
{{- end }}
