apiVersion: v2
name: cx-tck
description: |
  Runs the Catena-X Technology Compatibility Kit (cx-tck) in-cluster as a batch Job.
  It executes the DSP exchange + DCP identity conformance suite against a deployed EDC
  connector (e.g. the one from the tractusx chart) and hosts the TCK callback and its
  did:web documents on the cx-tck Service so the connector under test can call back and
  resolve the TCK identity. Uses the published ghcr.io/metaform/cx-tck-runtime image.
type: application
version: 0.1.0
appVersion: "latest"
