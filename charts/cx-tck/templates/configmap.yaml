## The cx-tck runtime configuration, mounted at /etc/tck/config.properties (the image's
## CONFIG_FILE). Values mirror CxTckSuiteRemoteTest. The connector DSP URLs are built from
## the controlplane service FQDN, and the JWK is normalized to a single compact JSON line so
## it is one logical value in the Java .properties file.
{{- $tck := .Values.tck }}
{{- $connectorHost := include "jadtx.fqdn" (dict "svc" $tck.connector.service "ctx" $) }}
{{- $dspRoot := printf "http://%s:%v%s" $connectorHost $tck.connector.port $tck.connector.dspBasePath }}
{{- $jwk := $tck.keyJwk | fromJson | toJson }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cx-tck-config
  namespace: {{ include "jadtx.namespace" . }}
  labels:
    app: cx-tck
    {{- include "jadtx.labels" . | nindent 4 }}
data:
  config.properties: |
    # Generated by the cx-tck Helm chart. Do not edit in-cluster; change chart values instead.
    dataspacetck.launcher=org.eclipse.dataspacetck.cx.system.CxSystemLauncher

    # Test a real connector under test (not the in-memory self-test).
    dataspacetck.dsp.local.connector=false

    # Embedded callback server bind host/port (SystemsConstants defaults; made explicit here).
    dataspacetck.host=0.0.0.0
    dataspacetck.port={{ $tck.callbackPort }}

    # DSP exchange protocol - the connector under test.
    dataspacetck.dsp.connector.http.url={{ $dspRoot }}/{{ $tck.participantId }}/{{ $tck.dspProfile }}
    dataspacetck.dsp.connector.http.base.url={{ $dspRoot }}/{{ $tck.participantId }}
    dataspacetck.dsp.connector.negotiation.initiate.url={{ $tck.connector.negotiationInitiateUrl }}
    dataspacetck.dsp.connector.transfer.initiate.url={{ $tck.connector.transferInitiateUrl }}
    dataspacetck.dsp.connector.agent.id={{ $tck.connector.agentId }}

    # DCP identity - hosted by the TCK on the cx-tck Service callback endpoint.
    dataspacetck.callback.address={{ $tck.callbackAddress }}
    dataspacetck.did.issuer={{ $tck.did.issuer }}
    dataspacetck.did.holder={{ $tck.did.holder }}
    dataspacetck.did.verifier={{ $tck.did.verifier }}
    dataspacetck.key.holder={{ $jwk }}
    dataspacetck.key.issuer={{ $jwk }}
    dataspacetck.cx.bpn={{ $tck.bpn }}
    dataspacetck.vc.scope.pattern={{ $tck.vcScopePattern }}

    # Catalog request test data (CxCatalog01Test).
    CX_CAT_01_01_DATASETID={{ $tck.datasets.catalog0101 }}
    CX_CAT_01_04_DATASETID={{ $tck.datasets.catalog0104 }}
    CX_CAT_01_05_DATASETID={{ $tck.datasets.catalog0105 }}

    # Full-flow test data (CxFlow01Test).
    CX_FLOW_01_01_DATASETID={{ $tck.datasets.flow0101Id }}
    CX_FLOW_01_01_FORMAT={{ $tck.datasets.flow0101Format }}
    CX_FLOW_01_02_DATASETID={{ $tck.datasets.flow0102Id }}

    # Token-renewal flow test data (CxRenewalFlow01Test).
    CX_RENEWAL_FLOW_01_01_DATASETID={{ $tck.datasets.renewal0101Id }}
    CX_RENEWAL_FLOW_01_01_FORMAT={{ $tck.datasets.renewal0101Format }}
    CX_RENEWAL_FLOW_01_02_DATASETID={{ $tck.datasets.renewal0102Id }}
    CX_RENEWAL_FLOW_01_02_FORMAT={{ $tck.datasets.renewal0102Format }}
