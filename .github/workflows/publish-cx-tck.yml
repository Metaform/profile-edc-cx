name: Publish cx-tck image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-cx-tck-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cx-tck-runtime

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar
        working-directory: cx-tck
        run: ./gradlew :cx-tck:shadowJar --no-daemon

      - name: Stage legal docs for image (ADDITIONAL_FILES glob must be non-empty)
        run: |
          mkdir -p cx-tck/cx-tck/build/legal
          cp LICENSE cx-tck/cx-tck/build/legal/LICENSE

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cx-tck/cx-tck
          file: cx-tck/cx-tck/src/main/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            JAR=build/libs/cx-tck-runtime.jar
            ADDITIONAL_FILES=build/legal/*
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
