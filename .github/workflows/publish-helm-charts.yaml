name: Publish Helm charts

on:
  create:

concurrency:
  group: publish-helm-charts-${{ github.ref }}
  cancel-in-progress: true

env:
  CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  publish:
    if: github.event.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package charts
        run: |
          mkdir -p dist
          version="${{ github.event.ref }}"
          version="${version#v}"
          for chart in charts/*; do
            test -f "$chart/Chart.yaml" || continue
            if grep -q '^dependencies:' "$chart/Chart.yaml"; then
              helm dependency build "$chart"
            fi
            helm package "$chart" --version "$version" --destination dist
          done

      - name: Publish charts to GHCR
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" "${{ env.CHART_REPOSITORY }}"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.ref }}
          generate_release_notes: true
