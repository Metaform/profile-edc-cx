# Sample configuration for the Catena-X TCK (cx-tck).
#
# cx-tck combines the DSP exchange protocol (dataspacetck.dsp.*) with the DCP identity mechanism
# (dataspacetck.* DID / callback keys, plus dataspacetck.cx.* bindings).

dataspacetck.debug=true

# The composing launcher that wires DSP exchange + DCP identity.
dataspacetck.launcher=org.eclipse.dataspacetck.cx.system.CxSystemLauncher

# ---------------------------------------------------------------------------
# Local self-test mode.
#
# When true, the catalog request is served by the in-memory TckConnector (no HTTP, no identity).
# Use this to verify the harness end-to-end without a running connector. Set to false to test a
# real Catena-X connector, in which case the DCP identity below is applied.
# ---------------------------------------------------------------------------
dataspacetck.dsp.local.connector=true

# ---------------------------------------------------------------------------
# DSP exchange protocol - the connector under test (used when local.connector=false).
# ---------------------------------------------------------------------------
dataspacetck.dsp.connector.agent.id=CONNECTOR_UNDER_TEST
dataspacetck.dsp.connector.http.url=http://localhost:8282/api/v1/dsp/2025-1
dataspacetck.dsp.connector.http.base.url=http://localhost:8282/api/dsp
dataspacetck.dsp.connector.negotiation.initiate.url=http://localhost:8687/tck/negotiations/requests
dataspacetck.dsp.connector.transfer.initiate.url=http://localhost:8687/tck/transfers/requests
dataspacetck.dsp.default.wait=10000000

# ---------------------------------------------------------------------------
# DCP identity - the TCK hosts these on its callback endpoint so the connector under test can
# resolve the requester DID and perform the presentation-query callback.
#
# The callback address must be reachable by the connector under test and match the host used in the
# did:web DIDs below. If the DIDs are omitted they are derived from the callback address.
# ---------------------------------------------------------------------------
dataspacetck.callback.address=http://localhost:8083
# dataspacetck.did.holder=did:web:localhost%3A8083:holder
# dataspacetck.did.verifier=did:web:localhost%3A8083:verifier
# dataspacetck.did.issuer=did:web:localhost%3A8083:issuer

# The DCP scope requested for the catalog authorization (defaults to the membership credential read scope).
# dataspacetck.cx.membership.scope=org.eclipse.dspace.dcp.vc.type:MembershipCredential:read

# The DID of the connector under test. Used as the audience of the self-issued identity token.
# If omitted, the TCK-hosted verifier DID is used (sufficient for local wiring, override for a real connector).
# dataspacetck.cx.provider.did=did:web:connector-under-test

# ---------------------------------------------------------------------------
# Catalog request test data.
# ---------------------------------------------------------------------------
CX_CAT_01_01_DATASETID=CXCAT0101

# ---------------------------------------------------------------------------
# Full-flow test data (catalog -> negotiation -> transfer).
#
# CX_FLOW_01_01 negotiates and transfers a normally-accessible dataset.
# CX_FLOW_01_02 negotiates a dataset whose contract policy the (non-matching BPN) identity cannot fulfil, so the
# connector under test terminates the negotiation. Both dataset ids must resolve to catalog-visible datasets on the
# connector under test; the second must additionally carry a contract policy the configured identity cannot satisfy.
# ---------------------------------------------------------------------------
CX_FLOW_01_01_DATASETID=CXFLOW0101
CX_FLOW_01_01_FORMAT=HTTP-PULL
CX_FLOW_01_02_DATASETID=CXFLOW0102
